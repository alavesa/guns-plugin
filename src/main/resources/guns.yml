# Gun & grenade definitions. Edit here (then /guns reload) or in-game with /guns edit.
#
# Gun stats:
#   name         display name (& color codes work, e.g. "&6Desert Fox")
#   model        custom_model_data STRING id for your resource pack (on a crossbow item)
#   damage       half-hearts per hit (4.0 = 2 hearts)
#   fire-rate    max shots per second
#   range        how far a shot reaches, in blocks (total, including ricochets)
#   magazine     shots per magazine (reload with F / swap-hands key)
#   reload-ticks how long a reload takes (20 ticks = 1 second)
#   sound        shot sound (namespaced key - resource pack custom sounds work too)
#   sound-pitch  pitch of the shot sound
#   effect       "none", "bleed", or a potion effect name (poison, wither, slowness, glowing...)
#   effect-ticks how long the effect lasts (20 = 1s)
#   effect-level bleed: damage per second | potions: effect strength (1 = level I)
#   ricochet     how many times a bullet bounces off blocks (0 = none)
#   mag          mags: id this gun reloads from - reloading consumes one such mag item
#                from the inventory. An EXPLICIT "mag: none" keeps the old loose-rounds
#                reload; a gun with NO mag key at all gets one auto-assigned (and written
#                here) on load, matched by its id/name (pistol/rifle/smg/shotgun/sniper).
#
# Grenade stats:
#   name / model as above (model on a snowball item)
#   power        explosion strength (TNT is 4.0)
#   fuse-ticks   0 = explode on impact, otherwise land + cook this long
#   velocity     throw speed multiplier
#   break-blocks whether the explosion damages the world (default false)
#
# Mag stats:
#   name / model as above (model on a prismarine shard item)
#   capacity     currently COSMETIC - one mag always fills the gun to its own
#                magazine size; the field is kept for older configs
#
# (a leftover "backstab" key on a gun is ignored - the mechanic was removed in 0.6.0)

guns:
  pistol:
    name: "&7Pistol"
    model: gun_pistol
    damage: 4.0
    fire-rate: 3.0
    range: 40
    magazine: 12
    reload-ticks: 25
    sound: "minecraft:block.stone_button.click_on"
    sound-pitch: 0.6
    effect: none
    effect-ticks: 60
    effect-level: 1
    ricochet: 0
    mag: mag_pistol
  rifle:
    name: "&8Rifle"
    model: gun_rifle
    damage: 7.0
    fire-rate: 1.2
    range: 90
    magazine: 5
    reload-ticks: 45
    sound: "minecraft:entity.firework_rocket.blast"
    sound-pitch: 1.4
    effect: none
    effect-ticks: 60
    effect-level: 1
    ricochet: 2
    mag: mag_rifle
  venom:
    name: "&2Venom SMG"
    model: gun_venom
    damage: 2.0
    fire-rate: 5.0
    range: 30
    magazine: 20
    reload-ticks: 35
    sound: "minecraft:block.bamboo.hit"
    sound-pitch: 1.8
    effect: poison
    effect-ticks: 80
    effect-level: 1
    ricochet: 0
    mag: mag_pistol

grenades:
  frag:
    name: "&cFrag Grenade"
    model: grenade_frag
    power: 2.5
    fuse-ticks: 25
    velocity: 1.5
    break-blocks: false

mags:
  mag_pistol:
    name: "&7Pistol Magazine"
    model: mag_pistol
    capacity: 12
  mag_pistol_ext:
    name: "&7Extended Pistol Magazine"
    model: mag_pistol_ext
    capacity: 20
  mag_rifle:
    name: "&8Rifle Magazine"
    model: mag_rifle
    capacity: 5
  mag_rifle_drum:
    name: "&8Rifle Drum"
    model: mag_rifle_drum
    capacity: 10
  mag_smg:
    name: "&2SMG Magazine"
    model: mag_smg
    capacity: 24
  mag_sniper:
    name: "&8Sniper Magazine"
    model: mag_sniper
    capacity: 3
  shells_shotgun:
    name: "&cShotgun Shells"
    model: shells_shotgun
    capacity: 6
