name: Guns
version: '0.11.1'
main: fi.alavesa.guns.GunsPlugin
softdepend: [Labra]
api-version: '1.21'
author: Piia Alavesa
description: Config-driven custom guns with in-game create/edit, crossbow aiming pose.
commands:
  guns:
    description: Gun commands - list, give, create, edit, remove, reload
    usage: |
      /guns list
      /guns give <id> [player]
      /guns create <id> [gun|grenade|mag]
      /guns edit <id> <stat> <value>
      /guns remove <gun|mag id>
      /guns reload
permissions:
  guns.use:
    description: Shoot guns and see /guns list
    default: true
  guns.give:
    description: Get guns with /guns give
    default: true
  guns.admin:
    description: Create, edit and remove guns
    default: op
